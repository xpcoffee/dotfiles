set -g mouse on
set -g history-limit 30000

# Theme/scheme
set-option -sa terminal-overrides ",xterm*:Tc"
set -g pane-border-format "#{pane_index} #{pane_current_path}"

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Prevent escape characters from showing when going in/out of terminal
set -sg escape-time 50

set -g detach-on-destroy off  # don't exit from tmux when closing a session

# Popup commands
bind-key -n C-g display-popup -d "#{pane_current_path}" \
  -w 90% \
  -h 90% \
  -E "lazygit"

bind-key -n C-s display-popup -E "bash -ic 'sesh connect \"\$(sesh list --icons | fzf --reverse \
  --no-sort --ansi --border-label \" sesh \" --prompt \"⚡  \" \
  --header \"  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find\" \
  --bind \"tab:down,btab:up\" \
  --bind \"ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)\" \
  --bind \"ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)\" \
  --bind \"ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)\" \
  --bind \"ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)\" \
  --bind \"ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)\" \
  --bind \"ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)\" \
)\"'"

# bind-key -n C-s display-popup

# Resource tmux config
bind-key -n C-t source-file ~/.tmux.conf

# Vim style pane selection
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# Vim style split panes
bind-key -n M-H split-window -h -b -c "#{pane_current_path}"  # Split left (new pane on left)
bind-key -n M-L split-window -h -c "#{pane_current_path}"  # Split right (new pane on right) 
bind-key -n M-J split-window -v -c "#{pane_current_path}"  # Split down (new pane below)
bind-key -n M-K split-window -v -b -c "#{pane_current_path}" # Split up (new pane above)


# Set status line before loading nord
set -g @nord_tmux_show_status_content "0"

#+----------------+
#+ Plugin Support +
#+----------------+
#+--- tmux-prefix-highlight ---+
set -g @prefix_highlight_output_prefix "#[fg=brightcyan]#[bg=black]#[nobold]#[noitalics]#[nounderscore]#[bg=brightcyan]#[fg=black]"
set -g @prefix_highlight_output_suffix ""
set -g @prefix_highlight_copy_mode_attr "fg=brightcyan,bg=black,bold"

#+--------+
#+ Status +
#+--------+

#+--- Bars ---+
set -g status-left "#[fg=black,bg=blue,bold] #S #[fg=blue,bg=black,nobold,noitalics,nounderscore]"
set -g status-right "#{prefix_highlight}#[fg=brightblack,bg=black,nobold,noitalics,nounderscore]#[fg=white,bg=brightblack] %Y-%m-%d #[fg=white,bg=brightblack,nobold,noitalics,nounderscore]#[fg=white,bg=brightblack] %H:%M #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]#[fg=black,bg=cyan,bold] xpcoffee "


#+--- Windows ---+
set -g window-status-format "#[fg=black,bg=brightblack,nobold,noitalics,nounderscore] #[fg=white,bg=brightblack]#I #[fg=white,bg=brightblack,nobold,noitalics,nounderscore] #[fg=white,bg=brightblack]#W #F #[fg=brightblack,bg=black,nobold,noitalics,nounderscore]"
set -g window-status-current-format "#[fg=black,bg=cyan,nobold,noitalics,nounderscore] #[fg=black,bg=cyan]#I #[fg=black,bg=cyan,nobold,noitalics,nounderscore] #[fg=black,bg=cyan]#W #F #[fg=cyan,bg=black,nobold,noitalics,nounderscore]"
set -g window-status-separator "" 


set -g default-terminal "screen-256color"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin "nordtheme/tmux"
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'


# set vi-mode
set-window-option -g mode-keys vi

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# split in current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
